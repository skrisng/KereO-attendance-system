<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        #root {
            border: 2px solid red;
            min-height: 200px;
            padding: 20px;
        }
        .test {
            background: yellow;
            padding: 20px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>Testing React App</h1>
    <p>If you see content below with a red border, React is rendering:</p>
    <div id="root">
        <div class="test">Loading React...</div>
    </div>
    
    <script type="module">
        import React from 'react';
        import ReactDOM from 'react-dom/client';
        
        function TestApp() {
            return React.createElement('div', { 
                style: { 
                    background: 'lightgreen', 
                    padding: '40px',
                    fontSize: '24px',
                    color: 'black'
                } 
            }, '✅ React is working! The app should be visible.');
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(TestApp));
    </script>
</body>
</html>
